<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC Pool 2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.svg">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="msapplication-TileColor" content="#0A1628">
<meta name="msapplication-TileImage" content="icon-192.svg">
<title>WC Pool 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0A1628;
    --navy-mid:   #122038;
    --navy-light: #1E3158;
    --gold:       #C8A951;
    --gold-dim:   #7A6330;
    --green-light:#4CAF50;
    --white:      #F0F4FA;
    --muted:      #6A80A0;
    --red:        #E8294A;
    --amber:      #FFB300;
    --card-bg:    #122038;
    --border:     rgba(200,169,81,0.18);
    --border-sub: rgba(255,255,255,0.05);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100dvh;overflow-x:hidden}

  /* ── HEADER ── */
  .app-header{background:var(--navy-mid);border-bottom:2px solid var(--gold);padding-top:env(safe-area-inset-top,0)}
  .header-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-ball{font-size:28px;line-height:1}
  .header-titles{display:flex;flex-direction:column;gap:1px}
  .header-eyebrow{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.75}
  .header-main{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;color:var(--white);line-height:1}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;padding:5px 9px;cursor:pointer;display:flex;align-items:center;gap:4px;letter-spacing:.04em;transition:color .15s,border-color .15s}
  .refresh-btn:active{color:var(--gold);border-color:var(--gold)}
  .refresh-btn.spinning svg{animation:spin .7s linear infinite}
  .last-updated{font-size:9px;color:var(--muted)}

  /* ── BOTTOM TAB BAR ── */
  .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy-mid);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
  .tab-btn{flex:1;background:none;border:none;color:var(--muted);padding:9px 8px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:color .15s;position:relative}
  .tab-btn.active{color:var(--gold)}
  .tab-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 2px 2px}
  .tab-btn svg{width:20px;height:20px}

  /* ── PAGE CONTENT ── */
  .page{display:none;padding-bottom:86px}
  .page.active{display:block}

  /* ── SCORE SUB-TABS ── */
  .sub-tab-bar{display:flex;background:var(--navy-mid);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .sub-tab{flex:1;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:11px 8px;cursor:pointer;transition:color .15s;border-bottom:2px solid transparent;position:relative}
  .sub-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .sub-tab-badge{display:inline-block;background:var(--red);color:#fff;font-size:8px;font-weight:800;border-radius:8px;padding:1px 5px;margin-left:4px;vertical-align:middle;line-height:14px}

  .sub-page{display:none;padding:12px 12px 0}
  .sub-page.active{display:block}

  /* ── SECTION LABEL ── */
  .section-label{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);opacity:.6;padding:10px 2px 6px;display:flex;align-items:center;gap:6px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

  /* ── MATCH CARD ── */
  .match-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .match-card.live{border-color:rgba(232,41,74,.5);box-shadow:0 0 12px rgba(232,41,74,.12)}
  .match-card-header{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--border-sub)}
  .match-meta{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:500}
  .match-status-text{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
  .status-live{color:var(--red)}
  .status-final{color:var(--muted)}
  .status-upcoming{color:var(--gold)}
  .match-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:10px 12px 12px;gap:6px}
  .team-side{display:flex;flex-direction:column;align-items:center;gap:5px}
  .team-flag{font-size:30px;line-height:1}
  .team-name{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.05em;color:var(--white);text-align:center;line-height:1.15;max-width:105px}
  .team-name.pool-team{color:var(--gold)}
  .pool-owner-tag{background:rgba(200,169,81,.12);border:1px solid rgba(200,169,81,.25);border-radius:20px;padding:1px 6px;font-size:8px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase}
  .scoreboard{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px}
  .score-row{display:flex;align-items:center;gap:3px}
  .score-num{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:var(--amber);min-width:24px;text-align:center}
  .score-sep{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--gold-dim);line-height:1;margin-bottom:2px}
  .kickoff-time{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:var(--white);text-align:center;line-height:1.3}
  .kickoff-date{font-size:9px;font-weight:500;color:var(--muted);text-align:center;letter-spacing:.04em}
  .et-tag{font-size:8px;font-weight:800;letter-spacing:.08em;padding:2px 5px;border-radius:3px;background:rgba(232,41,74,.15);color:var(--red);border:1px solid rgba(232,41,74,.35)}
  .live-dot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:pulse 1.3s ease-in-out infinite;flex-shrink:0}

  /* ── STANDINGS PAGE ── */
  .standings-page{padding:12px 12px 0}
  .standings-cols{display:grid;grid-template-columns:26px 1fr 48px 60px 40px;padding:4px 12px 6px;font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);opacity:.55;border-bottom:1px solid var(--border);margin-bottom:5px}
  .standings-cols>*:nth-child(3),.standings-cols>*:nth-child(4),.standings-cols>*:nth-child(5){text-align:right}
  .stand-row{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:border-color .15s}
  .stand-row:active{border-color:rgba(200,169,81,.5)}
  .stand-row.expanded{border-color:rgba(200,169,81,.35)}
  .stand-main{display:grid;grid-template-columns:26px 1fr 48px 60px 40px;align-items:center;padding:11px 12px;position:relative}
  .stand-row[data-rank="1"] .stand-main::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--gold);border-radius:2px}
  .stand-row[data-rank="2"] .stand-main::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:#9E9E9E;border-radius:2px}
  .stand-row[data-rank="3"] .stand-main::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:#8D5524;border-radius:2px}
  .rank-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);line-height:1;padding-left:6px}
  .rank-num.r1{color:var(--gold);font-size:22px}
  .rank-num.r2{color:#BDBDBD;font-size:21px}
  .rank-num.r3{color:#A0694A;font-size:21px}
  .stand-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;color:var(--white);padding-left:6px}
  .stand-pts{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white);text-align:right;padding-right:6px}
  .stand-max{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--muted);text-align:right;padding-right:8px}
  .stand-teams-col{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .teams-alive{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--green-light);line-height:1}
  .teams-total{font-size:9px;color:var(--muted);line-height:1}
  .expand-indicator{position:absolute;right:12px;bottom:6px;font-size:9px;color:var(--muted);transition:transform .2s;opacity:.5}
  .stand-row.expanded .expand-indicator{transform:rotate(180deg)}
  .team-list{display:none;border-top:1px solid var(--border);background:rgba(0,0,0,.18);padding:4px 0}
  .stand-row.expanded .team-list{display:block}
  .team-item{display:flex;align-items:center;padding:8px 14px;gap:10px;border-bottom:1px solid rgba(255,255,255,.03)}
  .team-item:last-child{border-bottom:none}
  .ti-flag{font-size:20px;flex-shrink:0;width:26px;text-align:center}
  .ti-name{flex:1;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--white)}
  .ti-name.out{text-decoration:line-through;text-decoration-color:rgba(232,41,74,.7);text-decoration-thickness:2px;color:var(--muted)}
  .ti-stage{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 5px;border-radius:3px;flex-shrink:0}
  .stage-grp{background:rgba(45,106,45,.2);color:#6FCF6F;border:1px solid rgba(45,106,45,.35)}
  .stage-ko{background:rgba(200,169,81,.12);color:var(--gold);border:1px solid rgba(200,169,81,.25)}
  .stage-out{background:rgba(232,41,74,.08);color:var(--red);border:1px solid rgba(232,41,74,.2);opacity:.75}
  .stage-live{background:rgba(232,41,74,.15);color:var(--red);border:1px solid rgba(232,41,74,.3)}
  .ti-pts{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--amber);min-width:28px;text-align:right;flex-shrink:0}
  .ti-pts.zero{color:var(--muted)}
  .record{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-align:center;line-height:1}
  .record .w{color:#4CAF50}
  .record .d{color:var(--gold)}
  .record .l{color:var(--red)}

  /* ── LOADING / EMPTY / ERROR ── */
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:16px;color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .spinner{width:34px;height:34px;border:3px solid rgba(200,169,81,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
  .error-banner{background:rgba(232,41,74,.08);border:1px solid rgba(232,41,74,.25);border-radius:8px;padding:10px 14px;margin:12px;font-size:11px;color:rgba(232,41,74,.85);text-align:center;line-height:1.5}
  .empty-state{text-align:center;padding:50px 24px;color:var(--muted);font-size:13px;line-height:1.7}
  .empty-icon{font-size:40px;display:block;margin-bottom:12px}

  /* ── UTILS ── */
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:0}

  /* Subtle pitch stripes on scores background */
  #page-scores{background:repeating-linear-gradient(180deg,transparent 0,transparent 48px,rgba(45,106,45,.03) 48px,rgba(45,106,45,.03) 96px)}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <span class="header-ball">⚽</span>
      <div class="header-titles">
        <span class="header-eyebrow">FIFA World Cup 2026</span>
        <span class="header-main">Pool Tracker</span>
      </div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
        <svg viewBox="0 0 20 20" fill="currentColor" width="12" height="12">
          <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/>
        </svg>
        Refresh
      </button>
      <span class="last-updated" id="last-updated" onclick="showDebugInfo()" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted">Loading…</span>
    </div>
  </div>
</header>

<!-- ══ SCORES PAGE ══ -->
<div id="page-scores" class="page active">

  <!-- Sub-tab bar -->
  <div class="sub-tab-bar">
    <button class="sub-tab active" id="sub-btn-live" onclick="switchSubTab('live')">
      Live &amp; Next <span class="sub-tab-badge" id="live-badge" style="display:none">0</span>
    </button>
    <button class="sub-tab" id="sub-btn-completed" onclick="switchSubTab('completed')">Results</button>
  </div>

  <!-- Live & Upcoming sub-page -->
  <div class="sub-page active" id="sub-live">
    <div class="loading-state" id="live-loading"><div class="spinner"></div><span>Fetching matches…</span></div>
    <div id="live-content" style="display:none"></div>
  </div>

  <!-- Completed sub-page -->
  <div class="sub-page" id="sub-completed">
    <div id="completed-content"></div>
  </div>

</div>

<!-- ══ STANDINGS PAGE ══ -->
<div id="page-standings" class="page">
  <div class="standings-page">
    <div class="loading-state" id="standings-loading"><div class="spinner"></div><span>Calculating standings…</span></div>
    <div id="standings-content" style="display:none"></div>
  </div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchPage('scores')" id="btn-scores">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
      <path d="M2 12h20"/>
    </svg>
    Scores
  </button>
  <button class="tab-btn" onclick="switchPage('standings')" id="btn-standings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    Standings
  </button>
</nav>

<script>
// ══════════════════════════════════════════════
// POOL DATA
// ══════════════════════════════════════════════
const POOL = [
  { name:'Connor',   teams:['Spain','Ecuador','Bosnia and Herzegovina','Paraguay','Curaçao','South Korea'] },
  { name:'Joe',      teams:['England','Mexico','Belgium'] },
  { name:'Tanner',   teams:['France','Uruguay','Senegal','Scotland','DR Congo','Haiti'] },
  { name:'Sam',      teams:['Argentina','Colombia','Japan','Czech Republic','Iran','Iraq'] },
  { name:'Andrew',   teams:['Switzerland','Canada','Sweden','Ghana','Cape Verde','Morocco','South Africa','Australia','Jordan','Austria'] },
  { name:'Jonathan', teams:['Germany','United States','Croatia','Algeria','Tunisia','Panama'] },
  { name:'Grant',    teams:['Portugal','Ivory Coast','Saudi Arabia','Qatar','Brazil'] },
  { name:'Jerrod',   teams:['Netherlands','Norway','Turkey','Egypt','Uzbekistan','New Zealand'] },
];

const ALIASES = {
  'usa':'United States','us':'United States','united states of america':'United States',
  "bosnia & herzegovina":'Bosnia and Herzegovina',"bosnia-herzegovina":'Bosnia and Herzegovina',
  "côte d'ivoire":'Ivory Coast',"cote d'ivoire":'Ivory Coast',
  'congo dr':'DR Congo','dr. congo':'DR Congo','democratic republic of congo':'DR Congo',
  'korea republic':'South Korea','republic of korea':'South Korea',
  'cabo verde':'Cape Verde',
  'curacao':'Curaçao',
  'czechia':'Czech Republic','czech rep.':'Czech Republic',
};

const FLAGS = {
  'Spain':'🇪🇸','Ecuador':'🇪🇨','Ivory Coast':'🇨🇮','Bosnia and Herzegovina':'🇧🇦',
  'Paraguay':'🇵🇾','Curaçao':'🇨🇼','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Mexico':'🇲🇽',
  'Austria':'🇦🇹','Australia':'🇦🇺','South Africa':'🇿🇦','Jordan':'🇯🇴',
  'France':'🇫🇷','Uruguay':'🇺🇾','Senegal':'🇸🇳','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'DR Congo':'🇨🇩','Haiti':'🇭🇹','Argentina':'🇦🇷','Colombia':'🇨🇴',
  'Japan':'🇯🇵','Czech Republic':'🇨🇿','Iran':'🇮🇷','Iraq':'🇮🇶',
  'Brazil':'🇧🇷','Switzerland':'🇨🇭','Canada':'🇨🇦','Sweden':'🇸🇪',
  'Ghana':'🇬🇭','Cape Verde':'🇨🇻','Germany':'🇩🇪','United States':'🇺🇸',
  'Croatia':'🇭🇷','Algeria':'🇩🇿','Tunisia':'🇹🇳','Panama':'🇵🇦',
  'Portugal':'🇵🇹','Belgium':'🇧🇪','Morocco':'🇲🇦','South Korea':'🇰🇷',
  'Saudi Arabia':'🇸🇦','Qatar':'🇶🇦','Netherlands':'🇳🇱','Norway':'🇳🇴',
  'Turkey':'🇹🇷','Egypt':'🇪🇬','Uzbekistan':'🇺🇿','New Zealand':'🇳🇿',
};

// All canonical pool team names for fast lookup
const POOL_TEAM_NAMES = new Set(POOL.flatMap(p => p.teams.map(t => t.toLowerCase())));

function canonicalize(raw) {
  if (!raw) return '';
  const str = typeof raw === 'string' ? raw : (raw.name || raw.country || String(raw));
  const lower = str.toLowerCase().trim();
  if (ALIASES[lower]) return ALIASES[lower];
  // Direct pool team match (case-insensitive)
  for (const p of POOL) for (const t of p.teams) if (t.toLowerCase() === lower) return t;
  // Title-case fallback
  return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function getOwner(teamName) {
  for (const p of POOL) for (const t of p.teams) if (t.toLowerCase() === teamName.toLowerCase()) return p.name;
  return null;
}

function flag(name) { return FLAGS[name] || '🏳'; }
function isPoolTeam(name) { return POOL_TEAM_NAMES.has(name.toLowerCase()); }

// ══════════════════════════════════════════════
// DATE / TIME PARSING
// openfootball format: date="2026-06-18", time="12:00 UTC-4"
// ══════════════════════════════════════════════
function parseMatchDatetime(date, time) {
  if (!date) return null;
  if (!time) return new Date(date + 'T12:00:00Z'); // fallback to noon UTC

  // Match "12:00 UTC-4" or "13:00 UTC-6" or "19:00 UTC+0"
  const m = time.match(/^(\d{1,2}):(\d{2})\s+UTC([+-]\d+)$/);
  if (!m) return new Date(date + 'T12:00:00Z');

  const localHour = parseInt(m[1]);
  const localMin  = parseInt(m[2]);
  const utcOffset = parseInt(m[3]); // e.g. -4, -6, -7
  // UTC = local - offset. Convert everything to minutes to handle day overflow
  // e.g. 19:00 UTC-6 → 19*60 + (-6)*(-60) = 1140+360 = 1500 mins = next day 01:00 UTC
  const totalMins = localHour * 60 + localMin - utcOffset * 60;
  const base = new Date(date + 'T00:00:00Z');
  base.setUTCMinutes(base.getUTCMinutes() + totalMins);
  return base;
}

function fmtKickoff(dt) {
  if (!dt || isNaN(dt.getTime())) return { time:'TBD', date:'' };
  const now = new Date();
  const isToday = dt.toDateString() === now.toDateString();
  const tmrw = new Date(now); tmrw.setDate(now.getDate()+1);
  const isTomorrow = dt.toDateString() === tmrw.toDateString();
  const dateStr = isToday ? 'Today'
    : isTomorrow ? 'Tomorrow'
    : dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const timeStr = dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
  return { time: timeStr, date: dateStr };
}

// ══════════════════════════════════════════════
// DATA FETCHING & PARSING
// ══════════════════════════════════════════════
let allMatches = [];
let teamStats  = {};
let hasLive    = false;
let refreshTimer = null;

// KO round name → stage key
function stageFromRound(round) {
  if (!round) return 'group';
  const r = round.toLowerCase();
  if (r.includes('final') && !r.includes('semi') && !r.includes('quarter') && !r.includes('third') && !r.includes('match for')) return 'final';
  if (r.includes('semi')) return 'semi_final';
  if (r.includes('quarter')) return 'quarter_final';
  if (r.includes('third') || r.includes('match for')) return 'third_place';
  if (r.includes('round of 16') || r === 'round of 16') return 'round_of_16';
  if (r.includes('round of 32') || r === 'round of 32') return 'round_of_32';
  return 'group';
}

function isKORound(round) {
  if (!round) return false;
  const r = round.toLowerCase();
  return r.includes('round of') || r.includes('quarter') || r.includes('semi') || r.includes('final') || r.includes('third');
}

// Placeholder slots like "2A", "1E", "3A/B/C/D/F" — not real teams yet
function isPlaceholder(name) {
  return /^[123][A-Z]/.test(name) || name.includes('/') || name === 'TBD' || name === '';
}

// NOTE: worldcup26.ir was evaluated as a live-score overlay source but its
// API requires a JWT auth token on all /get/* endpoints per its own Swagger
// docs, despite the README claiming "no auth needed for demo." That's a dead
// end for a client-side app with no backend to hold a secret. Removed.

async function fetchFromOpenfootball() {
  const res = await fetch(
    'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json',
    { cache: 'no-store' }
  );
  if (!res.ok) throw new Error('openfootball HTTP ' + res.status);
  const data = await res.json();

  return (data.matches || []).map(m => {
    const home = canonicalize(m.team1);
    const away = canonicalize(m.team2);

    // Skip placeholder bracket slots
    if (isPlaceholder(home) || isPlaceholder(away)) return null;

    const ft = m.score && m.score.ft;
    const finished = Array.isArray(ft) && ft.length === 2;
    const homeScore = finished ? ft[0] : null;
    const awayScore = finished ? ft[1] : null;

    const knockout  = isKORound(m.round);
    const stage     = stageFromRound(m.round);
    const raw       = JSON.stringify(m).toLowerCase();
    const wentBeyond = raw.includes('a.e.t') || raw.includes('aet') || raw.includes('pens') || raw.includes('penalties');

    const dt = parseMatchDatetime(m.date, m.time);
    const now = new Date();
    // Mark as "live" if datetime is within the last 2 hours and not finished
    // (openfootball doesn't have real-time live status, but we can approximate)
    const approxLive = !finished && dt && dt <= now && (now - dt) < 2 * 60 * 60 * 1000;

    return {
      id: `${m.date}-${home}-${away}`,
      home, away,
      homeScore, awayScore,
      finished, live: approxLive,
      knockout, stage, wentBeyondRegulation: wentBeyond,
      group: m.group || '',
      round: m.round || '',
      datetime: dt,
      ground: m.ground || '',
    };
  }).filter(Boolean);
}

// Build teamStats from match list
function buildTeamStats(matches) {
  const stats = {};
  POOL.forEach(p => p.teams.forEach(t => {
    stats[t] = { pts:0, groupPlayed:0, inKO:false, stage:'group', eliminated:false, playingNow:false, w:0, d:0, l:0 };
  }));

  for (const m of matches) {
    const sh = stats[m.home];
    const sa = stats[m.away];

    if (m.live) {
      if (sh) sh.playingNow = true;
      if (sa) sa.playingNow = true;
    }
    if (!m.finished) continue;

    if (!m.knockout) {
      if (sh) sh.groupPlayed++;
      if (sa) sa.groupPlayed++;
    } else {
      if (sh) { sh.inKO = true; sh.stage = m.stage; }
      if (sa) { sa.inKO = true; sa.stage = m.stage; }
    }

    const hs = m.homeScore, as = m.awayScore;
    if (hs === null || as === null) continue;

    if (!m.knockout) {
      if (hs > as)      { if(sh){sh.pts+=1;sh.w++} if(sa){sa.l++} }
      else if (as > hs) { if(sa){sa.pts+=1;sa.w++} if(sh){sh.l++} }
      else              { if(sh){sh.pts+=0.5;sh.d++} if(sa){sa.pts+=0.5;sa.d++} }
    } else {
      if (hs > as) {
        if (sh) { sh.pts+=1; sh.w++; }
        if (sa) { if(m.wentBeyondRegulation) sa.pts+=0.5; sa.l++; sa.eliminated=true; }
      } else {
        if (sa) { sa.pts+=1; sa.w++; }
        if (sh) { if(m.wentBeyondRegulation) sh.pts+=0.5; sh.l++; sh.eliminated=true; }
      }
    }
  }

  // Group-stage elimination: 3 games played, no KO match
  const koTeams = new Set(
    matches.filter(m => m.knockout && (m.finished || m.live))
           .flatMap(m => [m.home.toLowerCase(), m.away.toLowerCase()])
  );
  for (const t of Object.keys(stats)) {
    const s = stats[t];
    if (!s.inKO && s.groupPlayed >= 3 && !koTeams.has(t.toLowerCase())) {
      s.eliminated = true;
    }
  }
  return stats;
}

function pointsPossible(teamName, stats) {
  const s = stats[teamName];
  if (!s || s.eliminated) return 0;
  const groupLeft = Math.max(0, 3 - s.groupPlayed);
  const koMap = { group:5, round_of_32:4, round_of_16:3, quarter_final:2, semi_final:1, third_place:1, final:1 };
  if (s.inKO) return koMap[s.stage] ?? 5;
  return groupLeft + 5;
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  const debugLog = [];

  try {
    const baseMatches = await fetchFromOpenfootball();
    debugLog.push(`openfootball: ${baseMatches.length} matches loaded`);

    // openfootball never carries live scores (confirmed: it's a once-daily
    // manual update, not a live feed). So we don't pretend otherwise — any
    // match whose kickoff has passed but has no final score yet is shown as
    // "live, score pending" rather than faking a 0-0 or showing broken dashes.
    const now = new Date();
    let pendingCt = 0;
    const matches = baseMatches.map(m => {
      if (!m.finished && m.datetime && m.datetime <= now) {
        const minsSince = (now - m.datetime.getTime()) / 60000;
        if (minsSince >= 0 && minsSince < 130) {
          pendingCt++;
          return { ...m, live: true, scorePending: true };
        }
      }
      return m;
    });
    debugLog.push(`${pendingCt} match(es) detected as in-progress (kickoff passed, no final score yet)`);
    debugLog.push(`Data source updates roughly once per day — scores appear once the match finishes and the source is updated`);

    allMatches = matches;
    teamStats  = buildTeamStats(matches);
    hasLive    = matches.some(m => m.live);

    const updatedAt = new Date();
    lastDebugInfo = { time: updatedAt, log: debugLog };

    document.getElementById('last-updated').textContent =
      'Updated ' + updatedAt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

    renderLiveAndUpcoming(matches);
    renderCompleted(matches);
    renderStandings(teamStats);

    const liveCt = matches.filter(m => m.live).length;
    const badge = document.getElementById('live-badge');
    if (liveCt > 0) { badge.textContent = liveCt; badge.style.display = 'inline-block'; }
    else            { badge.style.display = 'none'; }

    scheduleNext(hasLive ? 60000 : 300000);
  } catch(e) {
    console.error('Load failed:', e);
    lastDebugInfo = { time: new Date(), log: [`Error: ${e.message}`] };
    document.getElementById('last-updated').textContent = 'Failed — tap refresh';
    document.getElementById('live-loading').style.display = 'none';
    document.getElementById('live-content').style.display = 'block';
    document.getElementById('live-content').innerHTML =
      `<div class="error-banner">⚠️ Couldn't load match data. Check your connection and tap Refresh.</div>`;
    scheduleNext(60000);
  } finally {
    btn.classList.remove('spinning');
  }
}

let lastDebugInfo = null;

function showDebugInfo() {
  if (!lastDebugInfo) { alert('No data loaded yet.'); return; }
  const lines = lastDebugInfo.log.map(l => `• ${l}`).join('\n');
  alert(`Last check: ${lastDebugInfo.time.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'})}\n\n${lines}`);
}

function scheduleNext(ms) {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, ms);
}

function manualRefresh() {
  clearTimeout(refreshTimer);
  document.getElementById('last-updated').textContent = 'Refreshing…';
  loadData();
}

// ══════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════
function recordBadge(teamName) {
  const s = teamStats[teamName];
  if (!s || (s.w === 0 && s.d === 0 && s.l === 0)) return '';
  return `<div class="record"><span class="w">${s.w}W</span> <span class="d">${s.d}D</span> <span class="l">${s.l}L</span></div>`;
}

function matchGroupLabel(m) {
  // Clean up "Group Group A" duplication from API
  let g = m.group || '';
  g = g.replace(/^Group\s+Group\s+/i, 'Group ');
  const roundLabelMap = {
    'round_of_32':'Round of 32', 'round_of_16':'Round of 16',
    'quarter_final':'Quarter-final', 'semi_final':'Semi-final',
    'third_place':'Third-place play-off', 'final':'Final'
  };
  if (m.knockout) return roundLabelMap[m.stage] || m.round;
  return g || m.round || '';
}

// Estimate match minute from kickoff time.
// Structure: 0–45 = first half, 45–60 = halftime window, 60–105 = second half
// We don't know added time, so we cap at 45+/90+ to signal extra time rather than
// showing impossible minutes.
function calcMatchMinute(kickoffDt) {
  if (!kickoffDt || isNaN(kickoffDt.getTime())) return null;
  const elapsedMs  = Date.now() - kickoffDt.getTime();
  const elapsedMin = elapsedMs / 60000;

  if (elapsedMin < 0)   return null;           // hasn't kicked off
  if (elapsedMin <= 45) return { label: `${Math.floor(elapsedMin)}'`, phase: '1H' };
  if (elapsedMin <= 60) return { label: 'HT',  phase: 'HT' };    // ~15-min halftime window
  // Second half: subtract the ~15-min halftime break
  const shMin = Math.floor(elapsedMin - 15);
  if (shMin <= 90)      return { label: `${shMin}'`, phase: '2H' };
  // Beyond 90 — likely in added time or extra time
  return { label: '90+\'', phase: '2H' };
}

function renderMatchCard(m) {
  const homeOwner = getOwner(m.home);
  const awayOwner = getOwner(m.away);
  const scoreKnown = m.homeScore !== null && m.awayScore !== null;
  const showScore = (m.finished || m.live) && scoreKnown;
  const kf = fmtKickoff(m.datetime);

  let statusHtml, statusClass;
  if (m.live) {
    statusClass = 'status-live';
    // Prefer the live API's own minute if it gave us one; otherwise estimate from kickoff
    const apiMinute = m.minute ? `${m.minute}'` : null;
    const clock = apiMinute ? null : calcMatchMinute(m.datetime);
    const clockStr = apiMinute
      ? ` · ${apiMinute}`
      : (clock ? (clock.phase === 'HT' ? ' · HT' : ` · ${clock.label}`) : '');
    statusHtml = `<span class="live-dot"></span> LIVE${clockStr}`;
  } else if (m.finished) {
    statusClass = 'status-final';
    statusHtml  = 'FINAL';
  } else {
    statusClass = 'status-upcoming';
    statusHtml  = 'UPCOMING';
  }

  const scoreArea = showScore
    ? `<div class="score-row">
         <span class="score-num">${m.homeScore}</span>
         <span class="score-sep">:</span>
         <span class="score-num">${m.awayScore}</span>
       </div>
       ${m.wentBeyondRegulation && m.finished ? '<div class="et-tag">AET/PENS</div>' : ''}`
    : m.live
      ? `<div class="kickoff-time" style="font-size:11px;color:var(--muted)">Score<br>pending</div>`
      : `<div class="kickoff-time">${kf.time}</div>
         <div class="kickoff-date">${kf.date}</div>`;

  const label = matchGroupLabel(m);
  const venue = m.ground ? ` · ${m.ground}` : '';

  return `
    <div class="match-card${m.live?' live':''}">
      <div class="match-card-header">
        <span class="match-meta">${label}${venue}</span>
        <span class="match-status-text ${statusClass}">${statusHtml}</span>
      </div>
      <div class="match-body">
        <div class="team-side">
          <div class="team-flag">${flag(m.home)}</div>
          <div class="team-name${homeOwner?' pool-team':''}">${m.home}</div>
          ${recordBadge(m.home)}
          ${homeOwner?`<div class="pool-owner-tag">${homeOwner}</div>`:''}
        </div>
        <div class="scoreboard">${scoreArea}</div>
        <div class="team-side">
          <div class="team-flag">${flag(m.away)}</div>
          <div class="team-name${awayOwner?' pool-team':''}">${m.away}</div>
          ${recordBadge(m.away)}
          ${awayOwner?`<div class="pool-owner-tag">${awayOwner}</div>`:''}
        </div>
      </div>
    </div>`;
}

function section(label, items) {
  if (!items.length) return '';
  return `<div class="section-label">${label}</div>` + items.map(renderMatchCard).join('');
}

// ══════════════════════════════════════════════
// RENDER: LIVE & UPCOMING
// ══════════════════════════════════════════════
function renderLiveAndUpcoming(matches) {
  document.getElementById('live-loading').style.display = 'none';
  const el = document.getElementById('live-content');
  el.style.display = 'block';

  const live     = matches.filter(m => m.live);
  const upcoming = matches.filter(m => !m.finished && !m.live)
                          .sort((a,b) => (a.datetime||0) - (b.datetime||0));

  const poolLive     = live.filter(m => isPoolTeam(m.home) || isPoolTeam(m.away));
  const otherLive    = live.filter(m => !isPoolTeam(m.home) && !isPoolTeam(m.away));
  const poolUpcoming = upcoming.filter(m => isPoolTeam(m.home) || isPoolTeam(m.away));
  const otherUpcoming= upcoming.filter(m => !isPoolTeam(m.home) && !isPoolTeam(m.away));

  let html = '';

  if (live.length > 0) {
    html += section('🔴 Live · Pool Teams', poolLive);
    html += section('🔴 Live · Other Matches', otherLive);
  }

  // Group pool upcoming by date for easier scanning
  const byDate = {};
  poolUpcoming.forEach(m => {
    const dk = m.datetime
      ? m.datetime.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
      : 'TBD';
    if (!byDate[dk]) byDate[dk] = [];
    byDate[dk].push(m);
  });

  if (Object.keys(byDate).length > 0) {
    html += `<div class="section-label">📅 Pool Teams — Upcoming</div>`;
    for (const [dateKey, ms] of Object.entries(byDate)) {
      html += `<div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:8px 2px 4px">${dateKey}</div>`;
      html += ms.map(renderMatchCard).join('');
    }
  }

  if (!html) {
    html = `<div class="empty-state"><span class="empty-icon">✅</span>All matches complete!<br>Check Results for full history.</div>`;
  }

  el.innerHTML = html;
}

// ══════════════════════════════════════════════
// RENDER: COMPLETED
// ══════════════════════════════════════════════
function renderCompleted(matches) {
  const el = document.getElementById('completed-content');
  const finished = matches.filter(m => m.finished)
                          .sort((a,b) => (b.datetime||0) - (a.datetime||0)); // newest first

  const poolDone  = finished.filter(m => isPoolTeam(m.home) || isPoolTeam(m.away));
  const otherDone = finished.filter(m => !isPoolTeam(m.home) && !isPoolTeam(m.away));

  let html = '';
  html += section('✅ Pool Team Results', poolDone);
  html += section('Other Results', otherDone);

  if (!html) {
    html = `<div class="empty-state"><span class="empty-icon">⚽</span>No completed matches yet.</div>`;
  }
  el.innerHTML = html;
}

// ══════════════════════════════════════════════
// RENDER: STANDINGS
// ══════════════════════════════════════════════
const STAGE_LABEL = {
  group:'GRP', round_of_32:'R32', round_of_16:'R16',
  quarter_final:'QF', semi_final:'SF', third_place:'3RD', final:'FNL'
};

function fmtPts(n) { return n % 1 === 0 ? String(n) : n.toFixed(1); }

function renderStandings(stats) {
  document.getElementById('standings-loading').style.display = 'none';
  const el = document.getElementById('standings-content');
  el.style.display = 'block';

  const rows = POOL.map(p => {
    let pts = 0, maxPts = 0, alive = 0;
    const details = p.teams.map(t => {
      const s = stats[t] || { pts:0, eliminated:false, stage:'group', playingNow:false, w:0, d:0, l:0 };
      const poss = pointsPossible(t, stats);
      pts    += s.pts;
      maxPts += s.pts + poss;
      if (!s.eliminated) alive++;
      return { name:t, pts:s.pts, eliminated:s.eliminated, stage:s.stage, playingNow:s.playingNow, w:s.w||0, d:s.d||0, l:s.l||0 };
    });
    return { ...p, pts, maxPts, alive, details };
  }).sort((a,b) => b.pts - a.pts || b.maxPts - a.maxPts);

  // Rank assignment
  rows.forEach((p, i) => {
    const prev = rows[i-1];
    p.displayRank = (i > 0 && prev.pts === p.pts && prev.maxPts === p.maxPts)
      ? prev.displayRank : i + 1;
  });

  let html = `
    <div class="standings-cols">
      <div>#</div><div>Player</div>
      <div>Pts</div><div>Max</div><div>Left</div>
    </div>`;

  for (const p of rows) {
    const r = p.displayRank;
    const rc = r===1?'r1':r===2?'r2':r===3?'r3':'';

    const teamItems = p.details.map(t => {
      let stageCls='stage-grp', stageText=STAGE_LABEL[t.stage]||'GRP';
      if (t.playingNow)   { stageCls='stage-live'; stageText='LIVE'; }
      else if (t.eliminated)   { stageCls='stage-out';  stageText='OUT'; }
      else if (t.stage !== 'group') stageCls='stage-ko';
      const hasRecord = t.w > 0 || t.d > 0 || t.l > 0;
      const recHtml = hasRecord
        ? `<div class="record" style="margin-right:4px"><span class="w">${t.w}W</span> <span class="d">${t.d}D</span> <span class="l">${t.l}L</span></div>`
        : '';
      return `
        <div class="team-item">
          <div class="ti-flag">${flag(t.name)}</div>
          <div class="ti-name${t.eliminated?' out':''}">${t.name}</div>
          ${recHtml}
          <div class="ti-stage ${stageCls}">${stageText}</div>
          <div class="ti-pts${t.pts===0?' zero':''}">${fmtPts(t.pts)}</div>
        </div>`;
    }).join('');

    html += `
      <div class="stand-row" data-rank="${r}" onclick="this.classList.toggle('expanded')">
        <div class="stand-main">
          <div class="rank-num ${rc}">${r}</div>
          <div class="stand-name">${p.name}</div>
          <div class="stand-pts">${fmtPts(p.pts)}</div>
          <div class="stand-max">${fmtPts(p.maxPts)}</div>
          <div class="stand-teams-col">
            <div class="teams-alive">${p.alive}</div>
            <div class="teams-total">of ${p.teams.length}</div>
          </div>
          <div class="expand-indicator">▼</div>
        </div>
        <div class="team-list">${teamItems}</div>
      </div>`;
  }

  el.innerHTML = html;
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function switchPage(page) {
  document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('btn-' + page).classList.add('active');
}

function switchSubTab(sub) {
  document.querySelectorAll('.sub-tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.sub-page').forEach(e => e.classList.remove('active'));
  document.getElementById('sub-btn-' + sub).classList.add('active');
  document.getElementById('sub-' + sub).classList.add('active');
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadData();

// While games are live, re-render match cards every 60s to tick the clock
// (no API call — just redraws from cached match data so the minute updates)
setInterval(() => {
  if (hasLive && allMatches.length > 0) {
    renderLiveAndUpcoming(allMatches);
  }
}, 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
